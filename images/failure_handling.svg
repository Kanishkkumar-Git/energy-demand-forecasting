<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="420" fill="#0f172a"/>

  <text x="500" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">Failure Handling — Graceful Degradation, Not Silent Failure</text>

  <!-- Forecasting agent failure path -->
  <text x="30" y="90" fill="#38bdf8" font-size="15" font-weight="bold">Forecasting Agent</text>
  <rect x="30" y="105" width="180" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="120" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">Primary calculation</text>
  <text x="120" y="148" text-anchor="middle" fill="#cbd5e1" font-size="11">(weighted average)</text>

  <path d="M 120 165 L 120 195" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="140" y="185" fill="#ef4444" font-size="10">fails</text>

  <rect x="30" y="200" width="180" height="60" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
  <text x="120" y="225" text-anchor="middle" fill="#cbd5e1" font-size="11">Retry with relaxed</text>
  <text x="120" y="243" text-anchor="middle" fill="#cbd5e1" font-size="11">window assumption</text>

  <path d="M 120 260 L 120 290" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="140" y="280" fill="#ef4444" font-size="10">fails</text>

  <rect x="30" y="295" width="180" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="320" text-anchor="middle" fill="#cbd5e1" font-size="11">Fallback: naive</text>
  <text x="120" y="338" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">historical average</text>

  <!-- Anomaly agent failure path -->
  <text x="270" y="90" fill="#a78bfa" font-size="15" font-weight="bold">Anomaly Agent</text>
  <rect x="270" y="105" width="180" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="360" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">LLM call (Gemini)</text>
  <text x="360" y="148" text-anchor="middle" fill="#cbd5e1" font-size="11">+ JSON parsing</text>

  <path d="M 360 165 L 360 195" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="380" y="185" fill="#ef4444" font-size="10">fails</text>

  <rect x="270" y="200" width="180" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="225" text-anchor="middle" fill="#cbd5e1" font-size="11">Fallback: rule-based</text>
  <text x="360" y="243" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">date/deviation checks</text>

  <!-- Report agent failure path -->
  <text x="510" y="90" fill="#a78bfa" font-size="15" font-weight="bold">Report Agent</text>
  <rect x="510" y="105" width="180" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="600" y="130" text-anchor="middle" fill="#cbd5e1" font-size="11">LLM call (Gemini)</text>
  <text x="600" y="148" text-anchor="middle" fill="#cbd5e1" font-size="11">+ RAG synthesis</text>

  <path d="M 600 165 L 600 195" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="620" y="185" fill="#ef4444" font-size="10">fails</text>

  <rect x="510" y="200" width="180" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="222" text-anchor="middle" fill="#cbd5e1" font-size="11">Fallback: templated</text>
  <text x="600" y="238" text-anchor="middle" fill="#cbd5e1" font-size="11">report using retrieved</text>
  <text x="600" y="254" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">guideline names</text>

  <!-- Right side: logging -->
  <rect x="750" y="105" width="220" height="250" rx="10" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="860" y="132" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Every fallback is logged</text>
  <text x="860" y="155" text-anchor="middle" fill="#94a3b8" font-size="11">to the shared state's</text>
  <text x="860" y="172" text-anchor="middle" fill="#facc15" font-size="12" font-weight="bold">errors[]</text>
  <text x="860" y="172" text-anchor="middle" fill="#94a3b8" font-size="11"> </text>
  <text x="860" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">field and printed in</text>
  <text x="860" y="209" text-anchor="middle" fill="#94a3b8" font-size="11">the CLI pipeline log —</text>
  <line x1="775" y1="225" x2="945" y2="225" stroke="#334155"/>
  <text x="860" y="248" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">visible, not silent.</text>
  <text x="860" y="275" text-anchor="middle" fill="#94a3b8" font-size="10">The pipeline always</text>
  <text x="860" y="292" text-anchor="middle" fill="#94a3b8" font-size="10">reaches "complete" or</text>
  <text x="860" y="309" text-anchor="middle" fill="#94a3b8" font-size="10">"complete_via_fallback"</text>
  <text x="860" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">— never crashes.</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
